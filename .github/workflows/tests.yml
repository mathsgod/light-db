name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: PHP ${{ matrix.php }} / ${{ matrix.db_engine }} ${{ matrix.db_version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            db_engine: MySQL
            db_version: '8.0'
            db_image: mysql:8.0
          - php: '8.2'
            db_engine: MariaDB
            db_version: '10.11'
            db_image: mariadb:10.11
          - php: '8.2'
            db_engine: MariaDB
            db_version: '11.4'
            db_image: mariadb:11.4
          - php: '8.3'
            db_engine: MySQL
            db_version: '8.0'
            db_image: mysql:8.0
          - php: '8.3'
            db_engine: MariaDB
            db_version: '10.11'
            db_image: mariadb:10.11
          - php: '8.3'
            db_engine: MariaDB
            db_version: '11.4'
            db_image: mariadb:11.4
          - php: '8.4'
            db_engine: MySQL
            db_version: '8.0'
            db_image: mysql:8.0
          - php: '8.4'
            db_engine: MariaDB
            db_version: '10.11'
            db_image: mariadb:10.11
          - php: '8.4'
            db_engine: MariaDB
            db_version: '11.4'
            db_image: mariadb:11.4
          - php: '8.5'
            db_engine: MySQL
            db_version: '8.0'
            db_image: mysql:8.0
          - php: '8.5'
            db_engine: MariaDB
            db_version: '10.11'
            db_image: mariadb:10.11
          - php: '8.5'
            db_engine: MariaDB
            db_version: '11.4'
            db_image: mariadb:11.4

    services:
      db:
        image: ${{ matrix.db_image }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, mysqli, mbstring, json
          coverage: none
          tools: composer

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.db_image }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.db_image }}-
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Create .env file
        run: |
          cat > .env <<EOF
          DATABASE_DRIVER=Pdo_Mysql
          DATABASE_HOSTNAME=127.0.0.1
          DATABASE_PORT=3306
          DATABASE_DATABASE=test_db
          DATABASE_USERNAME=root
          DATABASE_PASSWORD=root
          DATABASE_CHARSET=utf8mb4
          EOF

      - name: Wait for ${{ matrix.db_engine }}
        run: |
          for i in {1..30}; do
            if php -r 'new PDO("mysql:host=127.0.0.1;port=3306", "root", "root");' 2>/dev/null; then
              echo "${{ matrix.db_engine }} is ready"
              exit 0
            fi
            echo "Waiting for ${{ matrix.db_engine }}..."
            sleep 2
          done
          echo "${{ matrix.db_engine }} did not become ready in time"
          exit 1

      - name: Run PHPUnit
        run: composer test
